# ===============================
# = SERVER CONFIG
# ===============================
server.port=8080

# ===============================
# = DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/prabandhx
spring.datasource.username=root
spring.datasource.password=Aurosmita
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# = JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.format-sql=true
# Use MySQLDialect instead of deprecated MySQL8Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# = JWT CONFIGURATION
# ===============================
# JWT will expire in 30 days (configured in JwtUtil class)
# To change expiration, modify EXPIRATION constant in JwtUtil.java

# ===============================
# = FILE UPLOAD CONFIG
# ===============================
file.upload-dir=uploads
file.base-url=http://localhost:8080
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.enabled=true

# ===============================
# = LOGGING
# ===============================
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.com.prabandhx.prabandhx=DEBUG

# ===============================
# = ADMIN EMAIL RESTRICTIONS
# ===============================
admin.allowed.emails=admin@prabandhx.com,superadmin@company.com,aurosmitasahoo45@gmail.com,mkar1@gmail.com
admin.allowed.domains=@prabandhx.com,@admin.company.com,@company.com
admin.restriction.enabled=true

# ===============================
# = CORS CONFIG
# ===============================
spring.web.cors.allowed-origins=http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# ===============================
# = EMAIL CONFIGURATION (GMAIL)
# ===============================
# Replace with your actual Gmail address
spring.mail.username=your-actual-email@gmail.com
# Replace with your 16-character Gmail App Password
spring.mail.password=your-16-digit-app-password
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.debug=true

# ===============================
# = APP CONFIGURATION
# ===============================
app.base-url=http://localhost:5173
app.invitation.expiry-days=7