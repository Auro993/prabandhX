# ===============================
# = DATABASE CONFIGURATION
# ===============================

spring.datasource.url=jdbc:mysql://localhost:3306/prabandhx
spring.datasource.username=root
spring.datasource.password=Aurosmita
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ===============================
# = JPA / HIBERNATE CONFIG
# ===============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.format-sql=true

# IMPORTANT: DO NOT USE MySQL8Dialect (removed in Hibernate 7)
# Hibernate 7 auto-detects dialect automatically
# So we DO NOT set hibernate.dialect


# ===============================
# = SERVER CONFIG
# ===============================

server.port=8080


# ===============================
# = LOGGING (Optional)
# ===============================

logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE